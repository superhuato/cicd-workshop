name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # ใช้สำหรับบังคับให้ Action รันบน Node.js 24 ตามคำเตือน
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # เช็กถ้ามี v5 ให้เปลี่ยนเป็น v5 นะคะ

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build with Maven
        # เพิ่ม --no-transfer-progress เพื่อลด Log ของการโหลด Library ที่ไม่จำเป็น
        run: ./mvnw clean verify -B --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7