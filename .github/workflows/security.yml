name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # รันอัตโนมัติทุกวันจันทร์ตี 2 (UTC)
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write   # สำหรับ upload ผลไป Security tab

jobs:
  # ========== 1. CODE SCANNING ด้วย CodeQL ==========
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build
        run: |
          chmod +x mvnw
          ./mvnw clean compile -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ========== 2. DEPENDENCY SCANNING ด้วย OWASP ==========
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: "" # ล้างค่าเพื่อให้ใช้ตัวใน Container
        with:
          project: 'cicd-workshop'
          path: '.'
          format: 'HTML'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ========== 3. SECRET SCANNING ด้วย Gitleaks ==========
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ต้องการ history เต็มสำหรับสแกน

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 4. IMAGE SCANNING ด้วย Trivy ==========
  trivy-image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t scan-target:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'scan-target:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'