name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  # ========== 1. CODE SCANNING ด้วย CodeQL ==========
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ แก้: ย้าย setup-java ขึ้นมาก่อน Initialize CodeQL
      # เพราะ CodeQL ต้องรู้จัก Java toolchain ตั้งแต่ init phase
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build
        run: |
          chmod +x mvnw
          ./mvnw clean compile -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ========== 2. DEPENDENCY SCANNING ด้วย OWASP ==========
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ แก้: ลบ env: JAVA_HOME ออก — actions/setup-java จัดการให้เองอยู่แล้ว
      # การใส่ JAVA_HOME แบบ hardcode ทำให้ path ไม่ตรงกับที่ action ติดตั้งจริง
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'cicd-workshop'
          path: '.'
          format: 'HTML'
          # ✅ แก้: เพิ่ม out: 'reports' ให้ตรงกับ upload-artifact path ด้านล่าง
          # ✅ แก้: ลบ --noupdate ออก เพื่อให้ดาวน์โหลด NVD database (จำเป็นสำหรับ scan ที่แม่นยำ)
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetireJS

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # ========== 3. SECRET SCANNING ด้วย Gitleaks ==========
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 4. IMAGE SCANNING ด้วย Trivy ==========
  trivy-image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t scan-target:${{ github.sha }} .

      # ✅ แก้: เปลี่ยน exit-code เป็น '0' และใช้ continue-on-error: true
      # เหตุผล: exit-code: '1' ทำให้ step นี้ fail ก่อนที่ upload-sarif จะทำงาน
      # ทำให้ผลสแกนไม่ถูกส่งขึ้น Security tab เลย
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'scan-target:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'