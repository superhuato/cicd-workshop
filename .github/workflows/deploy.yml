name: Deploy

on:
  push:
    branches: [ develop ]
    tags: [ 'v*' ]

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========== DEPLOY TO STAGING ==========
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    # รันเฉพาะตอน push develop (ไม่ใช่ตอน push tag)
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://staging.example.local:8080

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest develop image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop

      - name: Simulated deploy
        run: |
          echo "🚀 Deploying to STAGING environment"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop"
          echo "Commit: ${{ github.sha }}"
          echo "✓ Deploy simulation completed"

  # ========== DEPLOY TO PRODUCTION ==========
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # รันเฉพาะตอน push tag ที่ขึ้นต้นด้วย v
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: http://prod.example.local:8080

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image by tag
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}

      - name: Simulated production deploy
        run: |
          echo "🚀 Deploying to PRODUCTION"
          echo "Version: ${{ steps.tag.outputs.version }}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.version }}"
          echo "✓ Production deploy completed"