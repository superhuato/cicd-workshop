spring:
  application:
    name: cicd-workshop

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cicd-workshop}
    username: ${DB_USER:workshop}
    password: ${DB_PASSWORD:workshop}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
